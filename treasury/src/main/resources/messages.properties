# Static Placeholders
# Anything after placeholder. is treated as a placeholder, which can be used in any of the below
# localisation configurations, you can define as many as you want here, and each are supported automatically.
placeholder.prefix=<bold><blue>TREASURY</blue></bold> <gray>»</gray>

# Below are placeholders to use to keep a consistent colour palette. sec for secondary, then the beginning and ending tags.
placeholder.secbegin=<#6f6fff>
placeholder.secend=</#6f6fff>
placeholder.secgt=<#6f6fff><</#6f6fff>
placeholder.seclt=<#6f6fff>></#6f6fff>

# Dynamic Placeholders
# N.B: Not all messages support all of these placeholders.
# {sender} -> sender's username
# {target} -> target's username
# {player} -> a player's username
# {amount} -> formatted currency amount
# {balance} -> formatted balance amount

# General
# --------------------------------------------------------------------------------
treasury.general.player-only={prefix} This command can only be run by a player.
treasury.general.unknown-player={prefix} That player has never joined this server.
treasury.general.invalid-amount={prefix} Amount must be greater than zero.

# Plugin Info
# --------------------------------------------------------------------------------
treasury.info={prefix} Treasury v{secbegin}{version}{secend} <gray>- Double-entry economy system</gray>

# Pay
# --------------------------------------------------------------------------------
treasury.pay.success={prefix} Paid {secbegin}{target}{secend} <green>{amount}</green>
treasury.pay.received={prefix} Received <green>{amount}</green> from {secbegin}{sender}{secend}
treasury.pay.self={prefix} You cannot pay yourself.
treasury.pay.insufficient={prefix} Insufficient funds. Your balance: <red>{balance}</red>
treasury.pay.ambiguous={prefix} <red>{target}</red> is both a player and a government account. Use {secbegin}/pay-account player {target} <amount>{secend} or {secbegin}/pay-account government {target} <amount>{secend}.

# Balance
# --------------------------------------------------------------------------------
treasury.balance.self={prefix} Your balance: <green>{balance}</green>
treasury.balance.other={prefix} {secbegin}{player}{secend}'s balance: <green>{balance}</green>

# Baltop
# --------------------------------------------------------------------------------
treasury.baltop.header={prefix} {secbegin}Top Balances{secend} <gray>(Page {page}/{pages})</gray>
treasury.baltop.entry=<gray>{rank}.</gray> {secbegin}{player}{secend} <gray>-</gray> <green>{balance}</green>
treasury.baltop.footer=<gray>Use /baltop {secbegin}{next}{secend} for the next page</gray>
treasury.baltop.empty={prefix} <gray>No balances to display.</gray>

# Transactions
# --------------------------------------------------------------------------------
treasury.transactions.header={prefix} {secbegin}Transactions{secend} <gray>(Page {page}/{pages})</gray>
treasury.transactions.entry=<dark_gray>#{txn}</dark_gray> {amount} <gray>-</gray> <white>{memo}</white> <dark_gray>({time})</dark_gray>
treasury.transactions.footer=<gray>Use /transactions {secbegin}{next}{secend} for the next page</gray>
treasury.transactions.empty={prefix} <gray>No transactions found.</gray>
treasury.transactions.audit.header={prefix} {secbegin}Transactions{secend} <gray>for {target} (Page {page}/{pages})</gray>
treasury.transactions.audit.footer=<gray>Use {secbegin}{command}{secend} for the next page</gray>
treasury.transactions.audit.empty={prefix} <gray>No transactions found for {target}.</gray>
treasury.transactions.audit.no-account={prefix} <gray>{target} has no treasury account yet.</gray>
treasury.transactions.audit.not-found={prefix} <red>No account with that ID.</red>
treasury.transactions.export.success={prefix} Transactions exported: <click:open_url:'{url}'>{secbegin}{url}{secend}</click>
treasury.transactions.export.not-found={prefix} <red>Account not found.</red>
treasury.transactions.export.no-access={prefix} <red>You do not have access to that account.</red>

# Tax (admin trigger)
# --------------------------------------------------------------------------------
treasury.tax.unknown-cycle={prefix} <red>Unknown cycle type '{cycle}'. Use: daily, weekly, monthly</red>
treasury.tax.unknown-player={prefix} <red>Player '{player}' has never played on this server.</red>
treasury.tax.balance.failed={prefix} <red>Balance tax failed: {reason}</red>

# Automated money movement notifications (sent to the affected player)
# --------------------------------------------------------------------------------
treasury.tax.collected={prefix} <red>{amount}</red> was deducted from your account for {tax}.
treasury.salary.received={prefix} You received <green>{amount}</green> in government salary.

# Eco Admin
# --------------------------------------------------------------------------------
treasury.eco.give.success={prefix} Gave <green>{amount}</green> to {secbegin}{target}{secend}
treasury.eco.give.notify={prefix} You received <green>{amount}</green> from an administrator
treasury.eco.take.success={prefix} Took <red>{amount}</red> from {secbegin}{target}{secend}
treasury.eco.take.notify={prefix} <red>{amount}</red> was removed from your account by an administrator
treasury.eco.take.insufficient={prefix} {secbegin}{target}{secend} has insufficient funds. Balance: <red>{balance}</red>
treasury.eco.set.success={prefix} Set {secbegin}{target}{secend}'s balance to <green>{amount}</green>
treasury.eco.set.notify={prefix} Your balance was set to <green>{amount}</green> by an administrator
treasury.eco.reset.success={prefix} Reset {secbegin}{target}{secend}'s balance to <green>{amount}</green>
treasury.eco.reset.notify={prefix} Your balance was reset to <green>{amount}</green> by an administrator

# Government Accounts
# --------------------------------------------------------------------------------
treasury.gov.not-found={prefix} <red>Government account '{account}' not found.</red>
treasury.gov.no-access={prefix} <red>You do not have access to that account.</red>
treasury.gov.account.created={prefix} Created government account {secbegin}{name}{secend}.
treasury.gov.account.archived={prefix} Archived government account {secbegin}{name}{secend}.
treasury.gov.account.primitive-archive={prefix} <red>Primitive government accounts cannot be archived.</red>
treasury.gov.account.already-exists={prefix} A government account named <red>{name}</red> already exists.
treasury.gov.account.list.header={prefix} {secbegin}Government Accounts{secend}
treasury.gov.account.list.entry=<gray>{id}.</gray> {secbegin}{name}{secend} <gray>-</gray> <green>{balance}</green>
treasury.gov.account.list.empty={prefix} <gray>No government accounts found.</gray>
treasury.gov.account.balance={prefix} {secbegin}{name}{secend} balance: <green>{balance}</green>
treasury.gov.account.history.header={prefix} {secbegin}{name}{secend} Transactions <gray>(Page {page}/{pages})</gray>
treasury.gov.account.history.empty={prefix} <gray>No transactions found for that account.</gray>
treasury.gov.account.transfer.success={prefix} Transferred <green>{amount}</green> from {secbegin}{from}{secend} to {secbegin}{to}{secend}.
treasury.gov.account.transfer.insufficient={prefix} <red>Insufficient funds.</red> {secbegin}{from}{secend} balance: <red>{balance}</red>
treasury.gov.account.not-government={prefix} <red>{name}</red> is not a government account.
treasury.gov.account.transfer.same-account={prefix} <red>Source and destination cannot be the same account ({name}).</red>
treasury.gov.payout.success={prefix} Paid <green>{amount}</green> from {secbegin}{from}{secend} to {secbegin}{to}{secend}.
treasury.gov.payout.unknown-recipient={prefix} <red>Unknown recipient '{name}'.</red> Must be a player name or business account.
treasury.gov.payout.received={prefix} You received <green>{amount}</green> from government account {secbegin}{from}{secend}.
treasury.gov.member.added={prefix} Added {secbegin}{player}{secend} as a member of {secbegin}{account}{secend}.
treasury.gov.member.removed={prefix} Removed {secbegin}{player}{secend} from {secbegin}{account}{secend}.
treasury.gov.member.group-added={prefix} Added group {secbegin}{group}{secend} as a member of {secbegin}{account}{secend}.
treasury.gov.member.group-removed={prefix} Removed group {secbegin}{group}{secend} from {secbegin}{account}{secend}.
treasury.gov.member.list.header={prefix} Members of {secbegin}{account}{secend}
treasury.gov.member.list.uuid={secbegin}{player}{secend}
treasury.gov.member.list.group=<gray>[group]</gray> {secbegin}{group}{secend}
treasury.gov.member.list.empty={prefix} <gray>No members.</gray>
treasury.gov.viewer.added={prefix} Granted {secbegin}{player}{secend} read-only view of {secbegin}{account}{secend}.
treasury.gov.viewer.removed={prefix} Revoked {secbegin}{player}{secend}'s view of {secbegin}{account}{secend}.
treasury.gov.viewer.group-added={prefix} Granted group {secbegin}{group}{secend} read-only view of {secbegin}{account}{secend}.
treasury.gov.viewer.group-removed={prefix} Revoked group {secbegin}{group}{secend}'s view of {secbegin}{account}{secend}.
treasury.gov.viewer.list.header={prefix} Viewers of {secbegin}{account}{secend} <gray>(read-only)</gray>
treasury.gov.viewer.list.uuid={secbegin}{player}{secend}
treasury.gov.viewer.list.group=<gray>[group]</gray> {secbegin}{group}{secend}
treasury.gov.viewer.list.empty={prefix} <gray>No viewers.</gray>
treasury.gov.auth.added={prefix} Added {secbegin}{player}{secend} as an authorizer of {secbegin}{account}{secend}.
treasury.gov.auth.removed={prefix} Removed authorizer {secbegin}{player}{secend} from {secbegin}{account}{secend}.
treasury.gov.auth.group-added={prefix} Added group {secbegin}{group}{secend} as an authorizer of {secbegin}{account}{secend}.
treasury.gov.auth.group-removed={prefix} Removed group {secbegin}{group}{secend} from {secbegin}{account}{secend}.
treasury.gov.auth.list.header={prefix} Authorizers of {secbegin}{account}{secend}
treasury.gov.auth.list.uuid={secbegin}{player}{secend}
treasury.gov.auth.list.group=<gray>[group]</gray> {secbegin}{group}{secend}
treasury.gov.auth.list.empty={prefix} <gray>No authorizers.</gray>
treasury.gov.auth.not-member={prefix} <red>{player}</red> must be a member before being made an authorizer.
treasury.gov.auth.group-not-member={prefix} Group {secbegin}{group}{secend} must be a group member before being made a group authorizer.

# Fines
# --------------------------------------------------------------------------------
treasury.fine.issued={prefix} Issued fine of <red>{amount}</red> to {secbegin}{player}{secend} for: {reason}
treasury.fine.issued.notify={prefix} You have been fined <red>{amount}</red> for: {reason}
treasury.fine.revoked={prefix} Revoked fine #{id} ({amount}) for {secbegin}{player}{secend}.
treasury.fine.revoked.notify={prefix} Your fine of <red>{amount}</red> for <gray>{reason}</gray> has been revoked.
treasury.fine.already-revoked={prefix} <red>Fine #{id} is already revoked.</red>
treasury.fine.not-found={prefix} <red>Fine #{id} not found.</red>
treasury.fine.insufficient={prefix} <red>{player}</red> has insufficient funds to cover this fine.
treasury.fine.firm.issued={prefix} Issued fine of <red>{amount}</red> to firm {secbegin}{firm}{secend} for: {reason}
treasury.fine.firm.insufficient={prefix} Firm <red>{firm}</red> has insufficient funds to cover this fine.
treasury.fine.firm.not-found={prefix} <red>Business account '{firm}' not found.</red>
treasury.fine.list.header={prefix} Fines for {secbegin}{player}{secend}
treasury.fine.list.entry=<gray>#{id}</gray> <red>{amount}</red> <gray>- {reason} ({date}){revoked_tag}</gray>
treasury.fine.list.empty={prefix} <gray>No fines found.</gray>
treasury.fine.info={prefix} Fine #{id}: <red>{amount}</red> for {secbegin}{player}{secend}
treasury.fine.info.detail=<gray>Reason:</gray> {reason} <gray>|</gray> <gray>Issued by:</gray> {secbegin}{issuer}{secend} <gray>|</gray> <gray>Date:</gray> {date}
treasury.fine.info.revoked=<gray>Revoked by</gray> {secbegin}{revoker}{secend} <gray>on</gray> {revoke_date}

# Help
# --------------------------------------------------------------------------------
treasury.help={prefix} Help <br>\
<gray>Treasury is the DemocracyCraft double-entry economy. Click a topic below to see its commands.</gray><br>\
<click:run_command:'/treasury help balance'>/treasury help {secbegin}balance{secend}</click> <gray>- /balance, /baltop</gray><br>\
<click:run_command:'/treasury help pay'>/treasury help {secbegin}pay{secend}</click> <gray>- /pay</gray><br>\
<click:run_command:'/treasury help transactions'>/treasury help {secbegin}transactions{secend}</click> <gray>- /transactions</gray><br>\
<click:run_command:'/treasury help eco'>/treasury help {secbegin}eco{secend}</click> <gray>- /eco (admin)</gray><br>\
<click:run_command:'/treasury help fine'>/treasury help {secbegin}fine{secend}</click> <gray>- /fine</gray><br>\
<click:run_command:'/treasury help gov'>/treasury help {secbegin}gov{secend}</click> <gray>- /government</gray><br>\
<click:run_command:'/treasury help tax'>/treasury help {secbegin}tax{secend}</click> <gray>- /tax</gray>

treasury.help.balance={prefix} Balance & Top Help<br>\
/balance <gray>- show your own balance</gray><br>\
/balance {secgt}<gray>player</gray>{seclt} <gray>- show another player's balance (admin)</gray><br>\
/baltop <gray>- show the top balances</gray><br>\
/baltop {secgt}<gray>page</gray>{seclt} <gray>- page through top balances</gray>

treasury.help.pay={prefix} Pay Help<br>\
/pay {secgt}<gray>target</gray>{seclt} {secgt}<gray>amount</gray>{seclt} <gray>- send money to a player or government account</gray>

treasury.help.transactions={prefix} Transactions Help<br>\
/transactions <gray>- show your recent transactions</gray><br>\
/transactions {secgt}<gray>page</gray>{seclt} <gray>- page through your transactions</gray><br>\
/transactions export <gray>- export your transactions to a paste link</gray><br>\
/transactions export {secgt}<gray>accountId</gray>{seclt} <gray>- export another account's transactions (requires access)</gray><br>\
/transactions {secbegin}audit{secend} {secgt}<gray>player</gray>{seclt} <gray>- view a player's transactions (staff/DOC)</gray><br>\
/transactions {secbegin}auditaccount{secend} {secgt}<gray>accountId</gray>{seclt} <gray>- view any account's transactions (staff/DOC)</gray>

treasury.help.eco={prefix} Eco (Admin) Help<br>\
/eco {secbegin}give{secend} {secgt}<gray>target</gray>{seclt} {secgt}<gray>amount</gray>{seclt}<br>\
/eco {secbegin}take{secend} {secgt}<gray>target</gray>{seclt} {secgt}<gray>amount</gray>{seclt}<br>\
/eco {secbegin}set{secend} {secgt}<gray>target</gray>{seclt} {secgt}<gray>amount</gray>{seclt}<br>\
/eco {secbegin}reset{secend} {secgt}<gray>target</gray>{seclt} <gray>- reset to the starting balance</gray>

treasury.help.fine={prefix} Fine Help<br>\
/fine {secbegin}issue{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>player</gray>{seclt} {secgt}<gray>amount</gray>{seclt} {secgt}<gray>reason</gray>{seclt} <gray>- fine a player into a government account</gray><br>\
/fine {secbegin}firm{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>firm</gray>{seclt} {secgt}<gray>amount</gray>{seclt} {secgt}<gray>reason</gray>{seclt} <gray>- fine a firm into a government account</gray><br>\
/fine {secbegin}revoke{secend} {secgt}<gray>id</gray>{seclt}<br>\
/fine {secbegin}list{secend} <gray>- your own fines</gray><br>\
/fine {secbegin}list{secend} {secgt}<gray>player</gray>{seclt} <gray>- list fines for a player</gray><br>\
/fine {secbegin}info{secend} {secgt}<gray>id</gray>{seclt}

treasury.help.tax={prefix} Tax Help<br>\
/tax {secbegin}status{secend} <gray>- show the current tax cycle schedule</gray><br>\
/tax {secbegin}trigger{secend} {secgt}<gray>cycle</gray>{seclt} <gray>- fire a daily/weekly/monthly cycle on demand</gray><br>\
/tax {secbegin}trigger balance{secend} {secgt}<gray>player</gray>{seclt} <gray>- collect personal balance tax from one player</gray>

treasury.help.gov={prefix} Government Help <gray>(alias /gov)</gray><br>\
<gray>Government accounts hold public funds. Click a topic below for its commands.</gray><br>\
<click:run_command:'/government help account'>/gov help {secbegin}account{secend}</click> <gray>- account lifecycle (create, archive, list, balance, history)</gray><br>\
<click:run_command:'/government help member'>/gov help {secbegin}member{secend}</click> <gray>- member management</gray><br>\
<click:run_command:'/government help auth'>/gov help {secbegin}auth{secend}</click> <gray>- authorizer management</gray><br>\
<click:run_command:'/government help transfer'>/gov help {secbegin}transfer{secend}</click> <gray>- transfers, pay, payout</gray>

treasury.help.gov.account={prefix} Government Account Help<br>\
/gov {secbegin}account create{secend} {secgt}<gray>name</gray>{seclt}<br>\
/gov {secbegin}account archive{secend} {secgt}<gray>name</gray>{seclt}<br>\
/gov {secbegin}account list{secend}<br>\
/gov {secbegin}account balance{secend} {secgt}<gray>name</gray>{seclt}<br>\
/gov {secbegin}account history{secend} {secgt}<gray>name</gray>{seclt}<br>\
/gov {secbegin}account history{secend} {secgt}<gray>name</gray>{seclt} {secgt}<gray>page</gray>{seclt}

treasury.help.gov.member={prefix} Government Member Help<br>\
/gov {secbegin}account member add{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>player</gray>{seclt}<br>\
/gov {secbegin}account member remove{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>player</gray>{seclt}<br>\
/gov {secbegin}account member addgroup{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>group</gray>{seclt}<br>\
/gov {secbegin}account member removegroup{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>group</gray>{seclt}<br>\
/gov {secbegin}account member list{secend} {secgt}<gray>account</gray>{seclt}

treasury.help.gov.auth={prefix} Government Authorizer Help <gray>(must be members first)</gray><br>\
/gov {secbegin}account auth add{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>player</gray>{seclt}<br>\
/gov {secbegin}account auth remove{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>player</gray>{seclt}<br>\
/gov {secbegin}account auth addgroup{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>group</gray>{seclt}<br>\
/gov {secbegin}account auth removegroup{secend} {secgt}<gray>account</gray>{seclt} {secgt}<gray>group</gray>{seclt}<br>\
/gov {secbegin}account auth list{secend} {secgt}<gray>account</gray>{seclt}

treasury.help.gov.transfer={prefix} Government Transfer & Payout Help<br>\
/gov {secbegin}account transfer{secend} {secgt}<gray>from</gray>{seclt} {secgt}<gray>to</gray>{seclt} {secgt}<gray>amount</gray>{seclt} <gray>[reason]</gray> <gray>- between gov accounts</gray><br>\
/gov {secbegin}pay{secend} {secgt}<gray>from</gray>{seclt} {secgt}<gray>to</gray>{seclt} {secgt}<gray>amount</gray>{seclt} <gray>[reason]</gray> <gray>- alias for transfer</gray><br>\
/gov {secbegin}payout{secend} {secgt}<gray>from</gray>{seclt} {secgt}<gray>to</gray>{seclt} {secgt}<gray>amount</gray>{seclt} <gray>[reason]</gray> <gray>- gov account to player or business</gray>