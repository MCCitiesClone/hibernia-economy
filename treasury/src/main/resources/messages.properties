# Static Placeholders
# Anything after placeholder. is treated as a placeholder, which can be used in any of the below
# localisation configurations, you can define as many as you want here, and each are supported automatically.
placeholder.prefix=<bold><blue>TREASURY</blue></bold> <gray>»</gray>

# Below are placeholders to use to keep a consistent colour palette. sec for secondary, then the beginning and ending tags.
placeholder.secbegin=<#6f6fff>
placeholder.secend=</#6f6fff>
placeholder.secgt=<#6f6fff><</#6f6fff>
placeholder.seclt=<#6f6fff>></#6f6fff>

# Dynamic Placeholders
# N.B: Not all messages support all of these placeholders.
# {sender} -> sender's username
# {target} -> target's username
# {player} -> a player's username
# {amount} -> formatted currency amount
# {balance} -> formatted balance amount

# General
# --------------------------------------------------------------------------------
treasury.general.player-only={prefix} This command can only be run by a player.
treasury.general.unknown-player={prefix} That player has never joined this server.
treasury.general.invalid-amount={prefix} Amount must be greater than zero.

# Plugin Info
# --------------------------------------------------------------------------------
treasury.info={prefix} Treasury v{secbegin}{version}{secend} <gray>- Double-entry economy system</gray>

# Pay
# --------------------------------------------------------------------------------
treasury.pay.success={prefix} Paid {secbegin}{target}{secend} <green>{amount}</green>
treasury.pay.received={prefix} Received <green>{amount}</green> from {secbegin}{sender}{secend}
treasury.pay.self={prefix} You cannot pay yourself.
treasury.pay.insufficient={prefix} Insufficient funds. Your balance: <red>{balance}</red>
treasury.pay.ambiguous={prefix} <red>{target}</red> is both a player and a government account. Use {secbegin}/pay-account player {target} <amount>{secend} or {secbegin}/pay-account government {target} <amount>{secend}.

# Balance
# --------------------------------------------------------------------------------
treasury.balance.self={prefix} Your balance: <green>{balance}</green>
treasury.balance.other={prefix} {secbegin}{player}{secend}'s balance: <green>{balance}</green>

# Baltop
# --------------------------------------------------------------------------------
treasury.baltop.header={prefix} {secbegin}Top Balances{secend} <gray>(Page {page}/{pages})</gray>
treasury.baltop.entry=<gray>{rank}.</gray> {secbegin}{player}{secend} <gray>-</gray> <green>{balance}</green>
treasury.baltop.footer=<gray>Use /baltop {secbegin}{next}{secend} for the next page</gray>
treasury.baltop.empty={prefix} <gray>No balances to display.</gray>
treasury.economy.header={prefix} {secbegin}Economy Overview{secend}
treasury.economy.personal=<gray>Players:</gray> <green>{amount}</green>
treasury.economy.business=<gray>Businesses:</gray> <green>{amount}</green>
treasury.economy.government=<gray>Governments:</gray> <green>{amount}</green>
treasury.economy.total=<gray>Total supply:</gray> <green>{amount}</green>
treasury.sales.empty={prefix} <gray>You have no recorded ChestShop sales.</gray>
treasury.sales.header={prefix} {secbegin}Your Sales{secend} <gray>(Page {page}/{totalPages})</gray>
treasury.sales.line=<gray>[{time}]</gray> {action} <green>{qty}x</green> {item} <gray>to</gray> {customer} <gray>for</gray> <green>{total}</green> <gray>(tax {tax})</gray>
treasury.sales.next-page=<gray>Use /sales {secbegin}{nextPage}{secend} for the next page</gray>
treasury.sales.summary.header={prefix} {secbegin}Your Sales Summary{secend} <gray>(last {days} days)</gray>
treasury.sales.summary.totals=<gray>Sales:</gray> {sales} <gray>· Units:</gray> {units} <gray>· Revenue:</gray> <green>{volume}</green> <gray>· Tax:</gray> {tax}
treasury.sales.summary.split=<gray>Sold:</gray> {sold} (<green>{soldVolume}</green>) <gray>· Bought:</gray> {bought} ({boughtVolume})
treasury.sales.summary.top-items-header=<gray>Top items:</gray>
treasury.sales.summary.top-item=<gray>-</gray> {item} <gray>—</gray> <green>{units}</green> units <gray>(</gray><green>{volume}</green><gray>)</gray>

# Transactions
# --------------------------------------------------------------------------------
treasury.transactions.header={prefix} {secbegin}Transactions{secend} <gray>(Page {page}/{pages})</gray>
treasury.transactions.entry=<dark_gray>#{txn}</dark_gray> {amount} <gray>-</gray> <white>{memo}</white> <dark_gray>({time})</dark_gray>
treasury.transactions.footer=<gray>Use /transactions {secbegin}{next}{secend} for the next page</gray>
treasury.transactions.empty={prefix} <gray>No transactions found.</gray>
treasury.transactions.audit.header={prefix} {secbegin}Transactions{secend} <gray>for {target} (Page {page}/{pages})</gray>
treasury.transactions.audit.footer=<gray>Use {secbegin}{command}{secend} for the next page</gray>
treasury.transactions.audit.empty={prefix} <gray>No transactions found for {target}.</gray>
treasury.transactions.audit.no-account={prefix} <gray>{target} has no treasury account yet.</gray>
treasury.transactions.audit.not-found={prefix} <red>No account with that ID.</red>
treasury.transactions.export.success={prefix} Transactions exported: <click:open_url:'{url}'>{secbegin}{url}{secend}</click>
treasury.transactions.export.not-found={prefix} <red>Account not found.</red>
treasury.transactions.export.no-access={prefix} <red>You do not have access to that account.</red>

# Tax (admin trigger)
# --------------------------------------------------------------------------------
treasury.tax.unknown-cycle={prefix} <red>Unknown cycle type '{cycle}'. Use: daily, weekly, monthly</red>

# Automated money movement notifications (sent to the affected player)
# --------------------------------------------------------------------------------
treasury.tax.collected={prefix} <red>{amount}</red> was deducted from your account for {tax}.
treasury.salary.received={prefix} You received <green>{amount}</green> in government salary.

# Eco Admin
# --------------------------------------------------------------------------------
treasury.eco.give.success={prefix} Gave <green>{amount}</green> to {secbegin}{target}{secend}
treasury.eco.give.notify={prefix} You received <green>{amount}</green> from an administrator
treasury.eco.take.success={prefix} Took <red>{amount}</red> from {secbegin}{target}{secend}
treasury.eco.take.notify={prefix} <red>{amount}</red> was removed from your account by an administrator
treasury.eco.take.insufficient={prefix} {secbegin}{target}{secend} has insufficient funds. Balance: <red>{balance}</red>
treasury.eco.set.success={prefix} Set {secbegin}{target}{secend}'s balance to <green>{amount}</green>
treasury.eco.set.notify={prefix} Your balance was set to <green>{amount}</green> by an administrator
treasury.eco.reset.success={prefix} Reset {secbegin}{target}{secend}'s balance to <green>{amount}</green>
treasury.eco.reset.notify={prefix} Your balance was reset to <green>{amount}</green> by an administrator

