treasury.gov.account.list.empty={prefix} <gray>No government accounts found.</gray>
treasury.gov.account.balance={prefix} {secbegin}{name}{secend} balance: <green>{balance}</green>
treasury.gov.account.history.header={prefix} {secbegin}{name}{secend} Transactions <gray>(Page {page}/{pages})</gray>
treasury.gov.account.history.empty={prefix} <gray>No transactions found for that account.</gray>
