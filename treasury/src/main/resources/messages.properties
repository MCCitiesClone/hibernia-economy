treasury.gov.viewer.group-removed={prefix} Revoked group {secbegin}{group}{secend}'s view of {secbegin}{account}{secend}.
treasury.gov.viewer.list.header={prefix} Viewers of {secbegin}{account}{secend} <gray>(read-only)</gray>
treasury.gov.viewer.list.uuid={secbegin}{player}{secend}
treasury.gov.viewer.list.group=<gray>[group]</gray> {secbegin}{group}{secend}
treasury.gov.viewer.list.empty={prefix} <gray>No viewers.</gray>
treasury.gov.auth.added={prefix} Added {secbegin}{player}{secend} as an authorizer of {secbegin}{account}{secend}.
treasury.gov.auth.removed={prefix} Removed authorizer {secbegin}{player}{secend} from {secbegin}{account}{secend}.
treasury.gov.auth.group-added={prefix} Added group {secbegin}{group}{secend} as an authorizer of {secbegin}{account}{secend}.
