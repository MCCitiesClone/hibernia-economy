treasury.gov.payout.success={prefix} Paid <green>{amount}</green> from {secbegin}{from}{secend} to {secbegin}{to}{secend}.
treasury.gov.payout.unknown-recipient={prefix} <red>Unknown recipient '{name}'.</red> Must be a player name or business account.
treasury.gov.payout.ambiguous={prefix} <red>{name}</red> is both a player and a government account. Pay the government via a typed account transfer, or rename to disambiguate.
treasury.gov.payout.received={prefix} You received <green>{amount}</green> from government account {secbegin}{from}{secend}.
