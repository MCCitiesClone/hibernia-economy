# Static Placeholders
# Anything after placeholder. is treated as a placeholder, which can be used in any of the below
# localisation configurations, you can define as many as you want here, and each are supported automatically.
placeholder.prefix=<bold><blue>TREASURY</blue></bold><gray>»</gray>

# Below are placeholders to use to keep a consistent colour palette. sec for secondary, then the beginning and ending tags.
placeholder.secbegin=<#6f6fff>
placeholder.secend=</#6f6fff>
placeholder.secgt=<#6f6fff><</#6f6fff>
placeholder.seclt=<#6f6fff>></#6f6fff>

# Dynamic Placeholders
# N.B: Not all messages support all of these placeholders.
# {version} -> plugin version
# {keyId} -> API key ID
# {accountId} -> account ID
# {token} -> API key token
# {count} -> count of keys
# {status} -> key status
# {expiry} -> key expiry date
# {firmId} -> firm ID
# {firmName} -> firm name
# {accountName} -> account name

# General
# --------------------------------------------------------------------------------
treasuryapi.general.player-only={prefix} This command can only be run by a player.

# Plugin Info
# --------------------------------------------------------------------------------
treasuryapi.info={prefix} TreasuryAPI v{secbegin}{version}{secend} <gray>- API key management</gray>

# Personal Keys
# --------------------------------------------------------------------------------
treasuryapi.personal.issue.success={prefix} Personal API key {secbegin}#{keyId}{secend} issued for account {secbegin}{accountId}{secend}.\n<gray>Token (click to copy):</gray> <click:copy_to_clipboard:'{token}'>{secbegin}{token}{secend}</click>

treasuryapi.personal.list.header={prefix} {secbegin}Your Personal API Keys{secend} <gray>({count} total)</gray>
treasuryapi.personal.list.entry=<gray>  #{keyId}</gray> {secbegin}Account {accountId}{secend} <gray>·</gray> {status} <gray>· exp. {expiry}</gray>
treasuryapi.personal.list.empty={prefix} <gray>You have not issued any personal API keys.</gray>

treasuryapi.personal.reissue.success={prefix} Personal key {secbegin}#{keyId}{secend} reissued. Valid for 180 days.\n<gray>New token (click to copy):</gray> <click:copy_to_clipboard:'{token}'>{secbegin}{token}{secend}</click>
treasuryapi.personal.reissue.not-found={prefix} <red>Personal API key not found.</red>
treasuryapi.personal.reissue.no-access={prefix} <red>You do not own that API key.</red>

treasuryapi.personal.revoke.success={prefix} Personal API key {secbegin}#{keyId}{secend} has been revoked.
treasuryapi.personal.revoke.not-found={prefix} <red>Personal API key not found.</red>
treasuryapi.personal.revoke.no-access={prefix} <red>You do not own that API key.</red>

# Business Keys
# --------------------------------------------------------------------------------
treasuryapi.business.issue.success={prefix} Business API key {secbegin}#{keyId}{secend} issued for {secbegin}{firmName}{secend} (firm #{firmId}).\n<gray>Token (click to copy):</gray> <click:copy_to_clipboard:'{token}'>{secbegin}{token}{secend}</click>
treasuryapi.business.issue.firm-not-found={prefix} <red>Firm not found.</red>
treasuryapi.business.issue.no-access={prefix} <red>Only the proprietor of a firm can issue API keys for it.</red>

treasuryapi.business.list.header={prefix} {secbegin}Your Business API Keys{secend} <gray>({count} total)</gray>
treasuryapi.business.list.entry=<gray>  #{keyId}</gray> {secbegin}Firm #{firmId}{secend} <gray>·</gray> {status} <gray>· exp. {expiry}</gray>
treasuryapi.business.list.empty={prefix} <gray>You have not issued any business API keys.</gray>

treasuryapi.business.list.access.header={prefix} {secbegin}Business API Keys (Employee Access){secend} <gray>({count} total)</gray>
treasuryapi.business.list.access.entry=<gray>  #{keyId}</gray> {secbegin}Firm #{firmId}{secend} <gray>·</gray> {status} <gray>· exp. {expiry}</gray>
treasuryapi.business.list.access.empty={prefix} <gray>No business API keys found for firms you are employed at.</gray>

treasuryapi.business.reissue.success={prefix} Business key {secbegin}#{keyId}{secend} reissued. Valid for 180 days.\n<gray>New token (click to copy):</gray> <click:copy_to_clipboard:'{token}'>{secbegin}{token}{secend}</click>
treasuryapi.business.reissue.not-found={prefix} <red>Business API key not found.</red>
treasuryapi.business.reissue.no-access={prefix} <red>You do not own that API key.</red>

treasuryapi.business.revoke.success={prefix} Business API key {secbegin}#{keyId}{secend} has been revoked.
treasuryapi.business.revoke.not-found={prefix} <red>Business API key not found.</red>
treasuryapi.business.revoke.no-access={prefix} <red>You do not own that API key.</red>

# ---- Explorer UI access ----
treasuryapi.ui.user.added={prefix} Granted {secbegin}{role}{secend} to {secbegin}{player}{secend}.
treasuryapi.ui.user.removed={prefix} Removed {secbegin}{role}{secend} from {secbegin}{player}{secend}.
treasuryapi.ui.user.not-granted={prefix} <gray>{player} did not have the {role} role.</gray>
treasuryapi.ui.user.invalid-role={prefix} <red>Invalid role '{role}'. Use admin or government.</red>
treasuryapi.ui.user.list={prefix} {secbegin}{player}{secend} <gray>roles:</gray> {roles}
treasuryapi.ui.link.success={prefix} <green>Your account is now linked to the explorer.</green>
treasuryapi.ui.link.partial={prefix} <green>Account linked.</green> <gray>(Keycloak attribute update is pending; it will apply on next login.)</gray>
treasuryapi.ui.link.invalid={prefix} <red>That link code is invalid or has expired. Generate a new one in the web UI.</red>
treasuryapi.ui.sync.done={prefix} <green>Your explorer roles have been synced from your in-game ranks.</green> <gray>Refresh the web UI to see the change.</gray>
treasuryapi.ui.sync.unavailable={prefix} <gray>Role syncing isn't available on this server (LuckPerms not installed).</gray>
treasuryapi.ui.sync.failed={prefix} <red>Couldn't sync your roles right now. Please try again shortly.</red>
