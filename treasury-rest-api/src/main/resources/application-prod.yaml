spring:
  application:
    name: treasury-rest-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  jackson:
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat
    time-zone: UTC

  devtools:
    restart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # The gateway (api.democracycraft.net/economy/) strips the prefix and forwards
  # X-Forwarded-Prefix/-Proto/-Host. `framework` makes Spring honour them so
  # links generated by springdoc (Swagger UI server URL) and actuator
  # reflect the externally visible URL.
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  tomcat:
    max-threads: ${TOMCAT_MAX_THREADS:200}
    accept-count: 100
    connection-timeout: 20000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  type-handlers-package: io.paradaux.treasuryrestapi.mybatis

api:
  jwt-secret: ${JWT_SECRET}

rate-limit:
  redis-host: ${RATE_LIMIT_REDIS_HOST:}
  redis-port: ${RATE_LIMIT_REDIS_PORT:6379}
  redis-password: ${RATE_LIMIT_REDIS_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  server:
    port: ${MANAGEMENT_PORT:8081}
