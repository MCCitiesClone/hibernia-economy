business.help.firms={prefix} Firms Help<br>\
<gray>A firm represents a legal entity distinct from that of the proprietorship.<br>\
A firm is made up of an owner, employees and associated Treasury accounts. Through your business you are able to own ChestShops as well as AreaShops, with funds being taken and inserted into the firm's account rather than the proprietor.<br><br>\
Employees can be given various levels of permissions, for more information see {secbegin}/business help staff{secend}</gray> <br>\
