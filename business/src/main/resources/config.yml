database:
  host: localhost
  port: 3306
  database: treasury
  username: root
  password: password
  table-prefix: treasury_

firm:
  # Maximum number of firms a single player may own (be proprietor of).
  # Set to 0 (or below) for no limit.
  owned-limit: 3
  # Minimum seconds a player must wait between creating firms. Keyed on creation
  # time (counting disbanded firms too) so create/disband spam is throttled.
  # Set to 0 (or below) to disable.
  create-cooldown-seconds: 300

sales:
  # economy-explorer base URL that `/firm sales export` deep-links into (the
  # explorer's own auth gates the page). Per tenant; leave blank to disable export.
  explorer-url: ""
  # Maximum window (days) a sales export may cover. 0 (or below) = unlimited.
  max-export-days: 30
  # Real-time sale notifications to a firm's online staff. Per-firm opt-in via
  # `/firm sales toggle <firm>`; this is the default state for firms that haven't
  # set it. Bursts are condensed into a digest flushed every notify-flush-seconds.
  notify-default: false
  notify-flush-seconds: 15

tax:
  balance:
    enabled: true
    government-account: "DCGovernment"
    brackets:
      0.00:       0.0      # $0.00    – $99,999.99  → 0 %
      100000.00:  0.01     # $100,000 – $199,999.99  → 1 %
      200000.00:  0.012    # $200,000 – $299,999.99  → 1.2 %
      300000.00:  0.014    # $300,000 – $499,999.99  → 1.4 %
      500000.00:  0.018    # $500,000+               → 1.8 %