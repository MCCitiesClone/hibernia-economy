name: Treasury API Plugin · Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'treasury-api-plugin/**'
      - '.github/workflows/treasury-api-plugin-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'treasury-api-plugin/**'
      - '.github/workflows/treasury-api-plugin-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Shadow JAR
        run: ./gradlew --no-daemon :treasury-api-plugin:clean :treasury-api-plugin:shadowJar -Pci=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        # Don't fail the build on a transient artifact-storage quota hit — the
        # jar is already built and validated by this point. The upload is a
        # convenience, not a gate.
        continue-on-error: true
        with:
          name: TreasuryAPI-Plugin
          path: treasury-api-plugin/build/libs/*.jar
          if-no-files-found: error
