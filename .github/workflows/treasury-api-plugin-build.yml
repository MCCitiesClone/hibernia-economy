name: Treasury API Plugin · Build & Test

# Runs the treasury-api-plugin unit tests (API-key minting + LuckPerms
# reconciliation — the credential authorising every REST admin write, ADT-169)
# and the shared :common JWT-key-derivation / UuidBin tests (ADT-168) before
# assembling the shaded jar. Path filters follow the project() dependency edges
# (common, treasury-api, business-api) so an upstream change that breaks this
# module actually triggers the workflow (ADT-170).

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'treasury-api-plugin/**'
      - 'common/**'
      - 'treasury/treasury-api/**'
      - 'business/business-api/**'
      - '.github/workflows/treasury-api-plugin-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'treasury-api-plugin/**'
      - 'common/**'
      - 'treasury/treasury-api/**'
      - 'business/business-api/**'
      - '.github/workflows/treasury-api-plugin-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # surface JUnit results as a check

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test (:common + :treasury-api-plugin) & build Shadow JAR
        run: ./gradlew --no-daemon :treasury-api-plugin:clean :common:test :treasury-api-plugin:test :treasury-api-plugin:shadowJar -Pci=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        # Don't fail the build on a transient artifact-storage quota hit — the
        # jar is already built and validated by this point. The upload is a
        # convenience, not a gate.
        continue-on-error: true
        with:
          name: TreasuryAPI-Plugin
          path: treasury-api-plugin/build/libs/*.jar
          if-no-files-found: error
