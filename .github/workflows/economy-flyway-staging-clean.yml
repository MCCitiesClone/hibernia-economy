name: Economy Flyway · Clean (staging only)

# Wipes the staging schema by running flywayClean. Cannot target production
# at all — there is no `target` input, and the only environment this job
# ever runs against is `staging-clean`. flyway.gradle.kts has
# cleanDisabled=true by default; -PflywayCleanEnabled=true is the explicit
# opt-in.
#
# Use case: phase-0 dry runs. Apply migrations, validate the data, then
# wipe the staging schema clean so the next dry run is reproducible. Do
# NOT configure secrets for this workflow against any production DB.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type STAGING to confirm wipe'
        type: string
        required: true

permissions:
  contents: read

jobs:
  clean:
    name: flywayClean against staging
    runs-on: ubuntu-latest
    environment: staging-clean

    steps:
      - name: Confirm wipe input
        run: |
          if [ "${{ inputs.confirm }}" != "STAGING" ]; then
            echo "::error::confirm input must be the literal string STAGING (got '${{ inputs.confirm }}')"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: flywayClean (drops everything in the schema)
        env:
          FLYWAY_URL: ${{ secrets.FLYWAY_URL }}
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
          FLYWAY_SCHEMA: ${{ secrets.FLYWAY_SCHEMA }}
        run: ./gradlew --no-daemon :economy-flyway:flywayClean -PflywayCleanEnabled=true
