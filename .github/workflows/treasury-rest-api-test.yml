name: Treasury REST API · Test

# The money-handling service must not ship untested. This runs the real *IT
# suite against a MariaDB service on PRs, and is reused (workflow_call) by the
# Docker build so an image is only pushed when these tests pass (ADT-19).

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'treasury-rest-api/**'
      - 'common/**'                # ADT-170: implementation(project(":common"))
      - 'economy-flyway/**'
      - '.github/workflows/treasury-rest-api-test.yml'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # surface JUnit results as a check

jobs:
  test:
    runs-on: ubuntu-latest

    # Real MariaDB alongside the runner. EmbeddedMariaDb picks this up via
    # TREASURY_REST_TEST_JDBC_URL and skips MariaDB4j (whose bundled binary needs
    # system libs the runner image doesn't ship).
    services:
      mariadb:
        # Pin to 10.11 LTS to mirror MariaDB4j locally and avoid the MariaDB 11
        # InnoDB row-version flakiness other suites hit under the mat triggers.
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: treasury
          MARIADB_DATABASE: treasury_rest_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests + coverage gate (≥55 % line, ADT-50 ratchet)
        env:
          TREASURY_REST_TEST_JDBC_URL: jdbc:mariadb://127.0.0.1:3306/treasury_rest_test
          TREASURY_REST_TEST_DB_USER: root
          TREASURY_REST_TEST_DB_PASS: treasury
        run: ./gradlew --no-daemon :treasury-rest-api:test :treasury-rest-api:jacocoTestReport :treasury-rest-api:jacocoTestCoverageVerification -Pci=true

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'treasury-rest-api/build/test-results/test/TEST-*.xml'
          require_tests: true
          detailed_summary: true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: treasury-rest-api-test-report
          path: |
            treasury-rest-api/build/reports/tests/
            treasury-rest-api/build/test-results/
