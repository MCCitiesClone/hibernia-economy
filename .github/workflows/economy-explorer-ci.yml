name: Economy Explorer · CI / Build and Push

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'economy-explorer/**'
      - '.github/workflows/economy-explorer-ci.yml'
  pull_request:
    paths:
      - 'economy-explorer/**'
      - '.github/workflows/economy-explorer-ci.yml'

defaults:
  run:
    working-directory: economy-explorer

jobs:
  # ── Unit + integration tests (real MariaDB, no query mocking) ──────────────
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: testpw
          MARIADB_DATABASE: economy_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_NAME: economy_test
      DB_USERNAME: root
      DB_PASSWORD: testpw
      RUN_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: economy-explorer/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit + integration tests with coverage
        run: npm run coverage
      - name: Upload coverage
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: economy-explorer-coverage
          path: economy-explorer/coverage/
          if-no-files-found: ignore

  # ── Build + push the image (only after tests pass, on push only) ──────────
  build-and-push:
    needs: [test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          # Env-prefixed immutable tag — Argo CD Image Updater watches
          # `<env>-sha-<short>` per overlay.
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${{ github.ref_name }}" == "main" ]; then
            ENV_NAME=production
            MUTABLE=prod
          elif [ "${{ github.ref_name }}" == "develop" ]; then
            ENV_NAME=development
            MUTABLE=latest
          else
            echo "Unsupported branch: ${{ github.ref_name }}"
            exit 1
          fi
          echo "SHA_TAG=${ENV_NAME}-sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "MUTABLE_TAG=${MUTABLE}" >> "$GITHUB_OUTPUT"

      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.HARBOR_REGISTRY }}/paradaux-public/economy-explorer
          docker build \
            -t "${IMAGE}:${{ steps.tags.outputs.SHA_TAG }}" \
            -t "${IMAGE}:${{ steps.tags.outputs.MUTABLE_TAG }}" \
            .

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.HARBOR_REGISTRY }}/paradaux-public/economy-explorer
          docker push "${IMAGE}:${{ steps.tags.outputs.SHA_TAG }}"
          docker push "${IMAGE}:${{ steps.tags.outputs.MUTABLE_TAG }}"
