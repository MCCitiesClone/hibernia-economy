name: Business · Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'business/**'
      - '.github/workflows/business-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'business/**'
      - '.github/workflows/business-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Shadow JAR
        run: ./gradlew --no-daemon :business:clean :business:shadowJar -Pci=true
