name: Treasury · Test & Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'treasury/**'
      - '.github/workflows/treasury-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'treasury/**'
      - '.github/workflows/treasury-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # surface JUnit results as a check
  pull-requests: write   # post coverage comment on PRs

jobs:
  test:
    runs-on: ubuntu-latest

    # Real MariaDB alongside the runner. Tests connect via TREASURY_TEST_JDBC_URL,
    # which makes MariadbContainerExtension skip its embedded MariaDB4j path
    # (whose bundled binary needs system libs Ubuntu 24.04 doesn't ship).
    services:
      mariadb:
        # Pin to 10.11 LTS — matches what MariaDB4j ships locally so CI behaviour
        # mirrors local. MariaDB 11 has surfaced flaky InnoDB row-version errors
        # (HA_ERR_RECORD_CHANGED #1020) under high concurrency with the AFTER INSERT
        # triggers on account_balances_mat.
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: treasury
          MARIADB_DATABASE: treasury_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      # Strip the api_keys block (sibling DC Business plugin owns the firm table
      # this references) but KEEP the trigger block that follows it — those triggers
      # maintain account_balances_mat. Then load via the mariadb CLI so DELIMITER
      # blocks parse correctly.
      - name: Apply schema to MariaDB service
        run: |
          awk '
            /^-- API KEYS$/      { skip=1 }
            /^DELIMITER \/\//    { skip=0 }
            !skip
          ' treasury/src/main/resources/schema.sql > /tmp/schema-test.sql
          mariadb -h 127.0.0.1 -P 3306 -u root -ptreasury treasury_test < /tmp/schema-test.sql

      - name: Run tests + verify coverage
        env:
          TREASURY_TEST_JDBC_URL: jdbc:mariadb://127.0.0.1:3306/treasury_test
          TREASURY_TEST_DB_USER: root
          TREASURY_TEST_DB_PASS: treasury
        run: ./gradlew --no-daemon :treasury:test :treasury:jacocoTestReport :treasury:jacocoTestCoverageVerification -Pci=true

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'treasury/**/build/test-results/test/TEST-*.xml'
          require_tests: true
          detailed_summary: true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: treasury-test-report
          path: |
            treasury/build/reports/tests/
            treasury/build/reports/jacoco/
            treasury/**/build/test-results/

      # PR-only: comment with overall + per-changed-file coverage and gate at 80 %
      # for files touched by this PR. The 95 % global gate is enforced above by
      # jacocoTestCoverageVerification.
      - name: Coverage gate (changed files ≥ 80 %)
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/treasury/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 95
          min-coverage-changed-files: 80
          title: Treasury coverage report
          update-comment: true
          pass-emoji: ':white_check_mark:'
          fail-emoji: ':x:'
