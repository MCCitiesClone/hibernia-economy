name: Treasury · Build & Publish API

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'treasury/**'
      - '.github/workflows/treasury-publish-api.yml'
  workflow_dispatch:

permissions:
  contents: write   # create tags + GitHub releases on main

concurrency:
  group: treasury-publish-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Don't publish an API jar that doesn't pass its tests (ADT-52).
  test:
    uses: ./.github/workflows/treasury-test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Determine base version
        id: ver
        run: |
          BASE_VERSION="$(./gradlew -q :treasury:treasury-api:properties | awk -F': ' '/^version:/ {print $2}' | head -n1)"
          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "Base version: $BASE_VERSION"

      - name: Compute publish version
        id: pick
        run: |
          BASE="${{ steps.ver.outputs.base }}"
          CORE="${BASE%-SNAPSHOT}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PUBLISH_VERSION="$CORE"
          else
            PUBLISH_VERSION="$CORE-SNAPSHOT"
          fi

          echo "version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing: $PUBLISH_VERSION"

      - name: Build & publish treasury-api
        run: ./gradlew --no-daemon :treasury:treasury-api:clean :treasury:treasury-api:publish -Pversion=${{ steps.pick.outputs.version }}
        env:
          REPO_USER: ${{ secrets.REPO_USER }}
          REPO_PASS: ${{ secrets.REPO_PASS }}

      # Cut a git tag + GitHub release for non-SNAPSHOT publishes (main only).
      # Tagged per-artifact (treasury-api-v…) since this repo's release automation
      # publishes the API jar, not the plugin shadowJar. Idempotent per version.
      - name: Tag + GitHub release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.pick.outputs.version }}"
          TAG="treasury-api-v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          ASSETS="$(ls treasury/treasury-api/build/libs/*.jar 2>/dev/null || true)"
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "treasury-api $VERSION" \
            --generate-notes \
            $ASSETS
