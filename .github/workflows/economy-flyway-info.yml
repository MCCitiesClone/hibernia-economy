name: Economy Flyway · Info (read-only)

# Manual-only. Runs flywayInfo + flywayValidate against the chosen target
# without applying anything. No approval gate — anyone with workflow-run
# permission on the repo can use this to see "what's pending" before
# requesting an actual migration.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        type: choice
        options:
          - democracycraft
          - statecraft
        required: true

permissions:
  contents: read

jobs:
  info:
    name: flywayInfo + flywayValidate against ${{ inputs.target }}
    runs-on: ubuntu-latest
    # Use the chosen environment so its secrets (FLYWAY_URL etc.) are scoped
    # in. Configure these per-environment in repo settings, NOT here.
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: flywayInfo (pending + applied migrations)
        env:
          FLYWAY_URL: ${{ secrets.FLYWAY_URL }}
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
          FLYWAY_SCHEMA: ${{ secrets.FLYWAY_SCHEMA }}
        run: ./gradlew --no-daemon :economy-flyway:flywayInfo

      # On a green-field DB every migration is "pending" and flywayValidate
      # exits non-zero. Keep it non-fatal so Info still succeeds as the
      # pre-deploy review — read the result, don't gate the first run on it.
      - name: flywayValidate (on-disk vs flyway_schema_history)
        continue-on-error: true
        env:
          FLYWAY_URL: ${{ secrets.FLYWAY_URL }}
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
          FLYWAY_SCHEMA: ${{ secrets.FLYWAY_SCHEMA }}
        run: ./gradlew --no-daemon :economy-flyway:flywayValidate
