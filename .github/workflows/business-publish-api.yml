name: Business · Publish API

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'business/**'
      - '.github/workflows/business-publish-api.yml'
  workflow_dispatch:

permissions:
  contents: write        # create tags + GitHub releases on main
  # The called business-test.yml requests these to surface JUnit results + post the
  # coverage comment; a reusable workflow can't be granted more than its caller, so
  # the caller must declare them too or the run fails at startup (CI fix).
  checks: write
  pull-requests: write

concurrency:
  group: business-publish-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Don't publish an API jar that doesn't pass its tests (ADT-52).
  test:
    uses: ./.github/workflows/business-test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper   # ADT-171: verify wrapper jar before running it with publish creds
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Determine base version
        id: ver
        run: |
          BASE_VERSION="$(./gradlew -q :business:business-api:properties | awk -F': ' '/^version:/ {print $2}' | head -n1)"
          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Compute publish version
        id: pick
        run: |
          BASE="${{ steps.ver.outputs.base }}"
          CORE="${BASE%-SNAPSHOT}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PUBLISH_VERSION="$CORE"
          else
            PUBLISH_VERSION="$CORE-SNAPSHOT"
          fi

          echo "version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT

      - name: Build & publish business-api
        env:
          REPO_USER: ${{ secrets.REPO_USER }}
          REPO_PASS: ${{ secrets.REPO_PASS }}
        run: |
          ./gradlew --no-daemon :business:business-api:clean :business:business-api:publish \
            -Pversion=${{ steps.pick.outputs.version }}

      # Cut a git tag + GitHub release for non-SNAPSHOT publishes (main only).
      # Tagged per-artifact (business-api-v…) since this repo's release automation
      # publishes the API jar, not the plugin shadowJar. Idempotent per version.
      - name: Tag + GitHub release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.pick.outputs.version }}"
          TAG="business-api-v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          ASSETS="$(ls business/business-api/build/libs/*.jar 2>/dev/null || true)"
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "business-api $VERSION" \
            --generate-notes \
            $ASSETS
