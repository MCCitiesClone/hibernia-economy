name: Business · Test & Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'business/**'
      - 'treasury/treasury-api/**'   # ADT-170: depends on project(":treasury:treasury-api")
      - '.github/workflows/business-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'business/**'
      - 'treasury/treasury-api/**'   # ADT-170: depends on project(":treasury:treasury-api")
      - '.github/workflows/business-test.yml'
  workflow_call:        # reused as a gate by business-publish-api.yml (ADT-52)
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # surface JUnit results as a check
  pull-requests: write   # post coverage comment on PRs

jobs:
  test:
    runs-on: ubuntu-latest

    # Real MariaDB alongside the runner. Tests connect via BUSINESS_TEST_JDBC_URL,
    # which makes MariadbContainerExtension skip its embedded MariaDB4j path
    # (whose bundled binary needs system libs Ubuntu 24.04 doesn't ship).
    services:
      mariadb:
        # Pin to 10.11 LTS — matches what MariaDB4j ships locally so CI behaviour
        # mirrors local, and avoids the MariaDB 11 flaky InnoDB row-version errors
        # under the account_balances_mat AFTER-INSERT triggers (see treasury-test).
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: business
          MARIADB_DATABASE: business_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # The schema is applied by the test harness itself: MariadbContainerExtension
      # runs the authoritative economy-flyway migrations with Flyway against this
      # service DB (no bundled schema.sql). The service only needs to provide an
      # empty business_test database.
      - name: Run tests + coverage gate (≥95 % line)
        env:
          BUSINESS_TEST_JDBC_URL: jdbc:mariadb://127.0.0.1:3306/business_test
          BUSINESS_TEST_DB_USER: root
          BUSINESS_TEST_DB_PASS: business
        run: ./gradlew --no-daemon :business:test :business:jacocoTestReport :business:jacocoTestCoverageVerification -Pci=true

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'business/**/build/test-results/test/TEST-*.xml'
          require_tests: true
          detailed_summary: true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: business-test-report
          path: |
            business/build/reports/tests/
            business/build/reports/jacoco/
            business/**/build/test-results/

      # PR-only: comment with overall + per-changed-file coverage.
      - name: Coverage gate (changed files ≥ 80 %)
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/business/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Business coverage report
          update-comment: true
          pass-emoji: ':white_check_mark:'
          fail-emoji: ':x:'
