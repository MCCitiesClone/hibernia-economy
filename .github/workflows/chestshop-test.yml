name: ChestShop · Test & Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'chestshop/**'
      - 'business/business-api/**'
      - 'treasury/treasury-api/**'
      - '.github/workflows/chestshop-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'chestshop/**'
      - 'business/business-api/**'
      - 'treasury/treasury-api/**'
      - '.github/workflows/chestshop-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # surface JUnit results as a check
  pull-requests: write   # post coverage comment on PRs

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Built through the root composite build so io.paradaux:treasury-api
      # and :business-api resolve to the in-repo Treasury/Business projects
      # (dependency substitution) instead of a published snapshot. No XML/Maven.
      - name: Run tests + JaCoCo
        run: ./gradlew --no-daemon :chestshop:test :chestshop:jacocoTestReport

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'chestshop/build/test-results/test/TEST-*.xml'
          require_tests: true
          detailed_summary: true

      - name: Upload coverage report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chestshop-coverage-report
          path: |
            chestshop/build/test-results/
            chestshop/build/reports/jacoco/

      # PR-only: comment with overall + per-changed-file coverage.
      # No hard gate — the goal is visibility on this fork; production gates
      # are enforced by the consumer plugins (treasury, business-rian).
      - name: Coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/chestshop/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 60
          title: ChestShop coverage report
          update-comment: true
          pass-emoji: ':white_check_mark:'
          fail-emoji: ':x:'
