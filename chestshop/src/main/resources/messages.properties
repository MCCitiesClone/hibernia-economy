chestshop.TRADE_DENIED={prefix}You don't have permission to trade with that shop!
chestshop.TRADE_DENIED_ACCESS_PERMS={prefix}You cannot trade with shops that you have access to!
chestshop.TRADE_DENIED_CREATIVE_MODE={prefix}You cannot trade with shops while you are in creative mode!

chestshop.NOT_ENOUGH_MONEY={prefix}You don't have enough money!
chestshop.NOT_ENOUGH_MONEY_SHOP={prefix}Shop owner doesn't have enough money!

chestshop.CLIENT_DEPOSIT_FAILED={prefix}Money deposit to your account failed!
chestshop.SHOP_DEPOSIT_FAILED={prefix}Money deposit to shop owner failed!
chestshop.NO_ECONOMY_ACCOUNT={prefix}Economy account from shop owner doesn't exist!

chestshop.NO_BUYING_HERE={prefix}You can't buy here!
