# HiberniaFramework command-error rendering keys (CommandManager.KEY_*).
hibernia.error.no-permission=<red>You don't have permission to use that command.</red>
hibernia.error.invalid-argument=<red>Invalid argument.</red>
hibernia.error.bad-command=<red>Unknown or malformed command.</red>
hibernia.error.not-found=<red>Not found.</red>
hibernia.error.conflict=<red>That action conflicts with the current state.</red>
hibernia.error.exceeds-limit=<red>That exceeds the allowed limit.</red>
hibernia.error.internal=<red>An internal error occurred. Please contact an administrator.</red>

# ── ChestShop messages ──────────────────────────────────────────────────────
# MiniMessage formatting; {name} placeholders are supplied by the Messages
# adapter. Every line starts with {prefix}: it resolves from placeholder.prefix
# for prefixed sends, and is overridden to "" for un-prefixed sends.
placeholder.prefix=<green>[Shop] </green>

chestshop.prefix=<green>[Shop] </green>

chestshop.shopinfo={prefix}<green>Shop Information:</green>\n<white>Owner: </white><gray>{owner}</gray>\n<white>Stock: </white><gray>{stock}</gray>\n<white>Item: </white><gray>{item}</gray>
chestshop.shopinfo_buy={prefix}<white>Buy </white><gray>{amount}</gray><white> for </white><gray>{price}</gray>
chestshop.shopinfo_sell={prefix}<white>Sell </white><gray>{amount}</gray><white> for </white><gray>{price}</gray>

chestshop.iteminfo={prefix}<green>Item Information:</green> <reset>
chestshop.iteminfo_fullname={prefix}<white>Full Name: </white><gray>{item}</gray>
chestshop.iteminfo_shopname={prefix}<white>Shop Sign: </white><gray>{item}</gray>
chestshop.iteminfo_repaircost={prefix}<white>Repair Cost: </white><gray>{cost}</gray>
chestshop.iteminfo_book={prefix}<white>Book Title: </white><gray>{title}</gray>\n<white>Book Author: </white><gray>{author}</gray>\n<white>Book Pages: </white><gray>{pages}</gray>
chestshop.iteminfo_book_generation={prefix}<white>Book Generation: </white><gray>{generation}</gray>
chestshop.iteminfo_leather_color={prefix}<white>Leather Color: </white><gray>Red: {colorred}, Green: {colorgreen}, Blue: {colorblue} (Hex: #{colorhex})</gray>
chestshop.iteminfo_bundle_items={prefix}<white>Bundle Items: </white><gray>{itemcount}</gray>
chestshop.iteminfo_axolotl_variant={prefix}<white>Axolotl Variant: </white><gray>{variant}</gray>
chestshop.iteminfo_armor_trim={prefix}<white>Armor Trim: </white><gray>{material} {pattern}</gray>
chestshop.iteminfo_recipes={prefix}<white>Recipe Knowledge:</white>
chestshop.iteminfo_map_view={prefix}<white>Map ID: </white><gray>{id}</gray>\n<white>Map World: </white><gray>{world}</gray>\n<white>Map Center: </white><gray>{x}/{z}</gray>\n<white>Map Locked: </white><gray>locked</gray>
chestshop.iteminfo_map_location={prefix}<white>Map Location: </white><gray>{location}</gray>
chestshop.iteminfo_tropical_fish={prefix}<white>Fish Pattern: </white><gray>{pattern}</gray>\n<white>Fish Pattern Color: </white><gray>{patterncolor}</gray>\n<white>Fish Body Color: </white><gray>{bodycolor}</gray>
chestshop.iteminfo_crossbow_projectiles={prefix}<white>Charged Crossbow Projectile:</white>
chestshop.iteminfo_crossbow_projectile={prefix}<white>{item}</white>
chestshop.iteminfo_lore={prefix}<white>Lore:</white>\n<reset>{lore}

chestshop.METRICS={prefix}<green>[Shop]</green> <white>Metrics:</white>\n<white>Accounts: </white><gray>{accounts}</gray>\n<white>Average transactions: </white><gray>{totalTransactions}</gray> <white>(buy: </white><gray>{buyTransactions}</gray> <white>sell: </white><gray>{sellTransactions}</gray><white>)</white>\n<white>Average items traded: </white><gray>{totalItems}</gray> <white>(bought: </white><gray>{boughtItems}</gray> <white>sold: </white><gray>{soldItems}</gray><white>)</white>

