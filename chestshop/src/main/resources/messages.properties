# ── ChestShop messages ──────────────────────────────────────────────────────
# Styled to match Treasury: a bold-blue brand + gray chevron prefix, the #6f6fff
# secondary accent (secbegin/secend) for names/values, <green> for prices, <gray>
# for labels, <red> for errors. The separating space is baked into the prefix, so
# templates put {prefix} immediately before content and un-prefixed sub-lines
# (sent via Message.send, which blanks {prefix}) carry no stray leading space.
placeholder.prefix=<bold><blue>SHOP</blue></bold> <gray>» </gray>
placeholder.secbegin=<#6f6fff>
placeholder.secend=</#6f6fff>

chestshop.prefix=<bold><blue>SHOP</blue></bold> <gray>» </gray>

chestshop.shopinfo={prefix}{secbegin}Shop Information{secend}\n<gray>Owner:</gray> {secbegin}{owner}{secend}\n<gray>Stock:</gray> {secbegin}{stock}{secend}\n<gray>Item:</gray> {item}
chestshop.shopinfo_buy={prefix}<gray>Buy</gray> {secbegin}{amount}{secend} <gray>for</gray> <green>{price}</green>
chestshop.shopinfo_sell={prefix}<gray>Sell</gray> {secbegin}{amount}{secend} <gray>for</gray> <green>{price}</green>

chestshop.iteminfo={prefix}{secbegin}Item Information{secend}
chestshop.iteminfo_fullname={prefix}<gray>Full Name:</gray> {item}
chestshop.iteminfo_shopname={prefix}<gray>Shop Sign:</gray> {item}
chestshop.iteminfo_repaircost={prefix}<gray>Repair Cost:</gray> {secbegin}{cost}{secend}
chestshop.iteminfo_book={prefix}<gray>Book Title:</gray> {secbegin}{title}{secend}\n<gray>Book Author:</gray> {secbegin}{author}{secend}\n<gray>Book Pages:</gray> {secbegin}{pages}{secend}
chestshop.iteminfo_book_generation={prefix}<gray>Book Generation:</gray> {secbegin}{generation}{secend}
chestshop.iteminfo_leather_color={prefix}<gray>Leather Color:</gray> <gray>Red:</gray> {secbegin}{colorred}{secend}<gray>, Green:</gray> {secbegin}{colorgreen}{secend}<gray>, Blue:</gray> {secbegin}{colorblue}{secend} <gray>(Hex: #{colorhex})</gray>
chestshop.iteminfo_bundle_items={prefix}<gray>Bundle Items:</gray> {secbegin}{itemcount}{secend}
chestshop.iteminfo_axolotl_variant={prefix}<gray>Axolotl Variant:</gray> {secbegin}{variant}{secend}
chestshop.iteminfo_armor_trim={prefix}<gray>Armor Trim:</gray> {secbegin}{material} {pattern}{secend}
chestshop.iteminfo_recipes={prefix}<gray>Recipe Knowledge:</gray>
chestshop.iteminfo_map_view={prefix}<gray>Map ID:</gray> {secbegin}{id}{secend}\n<gray>Map World:</gray> {secbegin}{world}{secend}\n<gray>Map Center:</gray> {secbegin}{x}/{z}{secend}\n<gray>Map Locked:</gray> {secbegin}locked{secend}
chestshop.iteminfo_map_location={prefix}<gray>Map Location:</gray> {secbegin}{location}{secend}
chestshop.iteminfo_tropical_fish={prefix}<gray>Fish Pattern:</gray> {secbegin}{pattern}{secend}\n<gray>Fish Pattern Color:</gray> {secbegin}{patterncolor}{secend}\n<gray>Fish Body Color:</gray> {secbegin}{bodycolor}{secend}
chestshop.iteminfo_crossbow_projectiles={prefix}<gray>Charged Crossbow Projectile:</gray>
chestshop.iteminfo_crossbow_projectile={prefix}{item}
chestshop.iteminfo_lore={prefix}<gray>Lore:</gray>\n{lore}

chestshop.METRICS={prefix}{secbegin}Metrics{secend}\n<gray>Accounts:</gray> {secbegin}{accounts}{secend}\n<gray>Average transactions:</gray> {secbegin}{totalTransactions}{secend} <gray>(buy:</gray> {secbegin}{buyTransactions}{secend} <gray>sell:</gray> {secbegin}{sellTransactions}{secend}<gray>)</gray>\n<gray>Average items traded:</gray> {secbegin}{totalItems}{secend} <gray>(bought:</gray> {secbegin}{boughtItems}{secend} <gray>sold:</gray> {secbegin}{soldItems}{secend}<gray>)</gray>

