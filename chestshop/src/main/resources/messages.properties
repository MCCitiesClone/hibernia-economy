hibernia.error.no-permission=<red>You don't have permission to use that command.</red>
hibernia.error.invalid-argument=<red>Invalid argument.</red>
hibernia.error.bad-command=<red>Unknown or malformed command.</red>
hibernia.error.not-found=<red>Not found.</red>
hibernia.error.conflict=<red>That action conflicts with the current state.</red>
